<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minhas Tarefas • PWA</title>
  
  <meta name="theme-color" content="#0f172a"/>
  <meta name="description" content="Lista de tarefas simples, offline e instalável"/>
  
  <!-- PWA essentials -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/> <!-- crie ícones depois -->
  
  <!-- Estilos -->
  <link rel="stylesheet" href="style.css"/>
  
  <!-- ícones de fontes (opcional, mas deixa bonito) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <header>
    <h1>Minhas Tarefas</h1>
    <button id="toggle-theme" title="Alternar tema">
      <i class="fa-solid fa-moon"></i>
    </button>
  </header>

  <main>
    <form id="task-form">
      <input 
        type="text" 
        id="task-input" 
        placeholder="O que você precisa fazer?" 
        autocomplete="off"
        required
      />
      <button type="submit">
        <i class="fa-solid fa-plus"></i> Adicionar
      </button>
    </form>

    <ul id="task-list"></ul>

    <div id="stats">
      <span id="total">0 tarefas</span>
      <span id="pending">0 pendentes</span>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
